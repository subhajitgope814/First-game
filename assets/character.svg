<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="body" x1="18%" y1="15%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#8e6b4d"/>
      <stop offset="48%" stop-color="#6f4d36"/>
      <stop offset="100%" stop-color="#4a3022"/>
    </linearGradient>
    <linearGradient id="highlight" x1="18%" y1="8%" x2="90%" y2="92%">
      <stop offset="0%" stop-color="#d3ac82"/>
      <stop offset="100%" stop-color="#956d49"/>
    </linearGradient>
    <linearGradient id="blue" x1="10%" y1="12%" x2="95%" y2="88%">
      <stop offset="0%" stop-color="#7ee5f3"/>
      <stop offset="100%" stop-color="#2f91ab"/>
    </linearGradient>
    <radialGradient id="eye" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffd778"/>
      <stop offset="70%" stop-color="#c8922e"/>
      <stop offset="100%" stop-color="#7f5414"/>
    </radialGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#20130f" flood-opacity=".35"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <ellipse cx="61" cy="102" rx="22" ry="6" fill="#243342" opacity=".18" filter="url(#glow)"/>

    <g transform="translate(6 14)">
      <!-- main head -->
      <path d="M28 58L34 44L47 33L64 29L82 31L95 39L103 50L106 61L103 72L95 81L82 86L63 88L46 85L35 79L28 70Z" fill="url(#body)"/>

      <!-- top plates -->
      <path d="M36 44L47 35L62 31L77 33L88 39L80 45L66 43L52 44L42 48Z" fill="url(#highlight)"/>
      <path d="M81 31L95 19L101 29L93 37L85 39Z" fill="url(#highlight)"/>
      <path d="M31 39L27 25L34 27L41 39L36 43Z" fill="url(#highlight)"/>

      <!-- blue stripe / cheek -->
      <path d="M31 56L41 49L55 45L70 46L83 50L94 58L85 63L72 58L57 55L42 57L34 63Z" fill="url(#blue)"/>
      <path d="M88 50L102 54L108 61L104 70L92 67L86 60Z" fill="#2b8ea8"/>

      <!-- back fin -->
      <path d="M99 54L108 50L117 54L118 61L111 66L103 63Z" fill="#8d6647"/>
      <path d="M102 61L112 63L116 69L111 74L101 72L97 66Z" fill="#3d95af"/>
      <path d="M105 57L114 58L117 62L111 66L103 65Z" fill="#79e2f1" opacity=".85"/>

      <!-- lower jaw / mouth -->
      <path d="M39 67L47 74L58 80L71 80L82 76L88 70L85 79L78 88L65 92L50 91L39 85L33 77Z" fill="#573826"/>
      <path d="M44 69L52 74L62 77L73 76L80 72L78 81L71 87L59 89L48 87L41 81Z" fill="#120a0a"/>
      <path d="M66 58L82 60L88 66L83 72L69 70L63 64Z" fill="#9fdfea" opacity=".18"/>

      <!-- teeth -->
      <rect x="47" y="81" width="4" height="10" fill="#f3e8d6"/>
      <rect x="54" y="83" width="4" height="9" fill="#efe1c8"/>
      <rect x="61" y="84" width="4" height="9" fill="#f3e8d6"/>
      <rect x="68" y="83" width="4" height="9" fill="#efe1c8"/>
      <rect x="75" y="80" width="4" height="10" fill="#f3e8d6"/>

      <!-- eye -->
      <rect x="68" y="49" width="9" height="7" rx="1" fill="url(#eye)"/>
      <rect x="71" y="52" width="3" height="3" rx=".5" fill="#170f0c"/>
      <rect x="66" y="47" width="13" height="2" fill="#2d1c13"/>

      <!-- small horn / spikes -->
      <path d="M58 37L63 31L66 35L61 41Z" fill="#cda47a"/>
      <path d="M52 34L56 28L60 30L56 36Z" fill="#af8157"/>
      <path d="M86 40L92 33L96 38L90 44Z" fill="#b7895f"/>
      <path d="M31 58L39 56L47 57L44 64L36 66L30 63Z" fill="#744f37"/>
      <path d="M42 59L49 57L57 58L54 64L46 66L41 63Z" fill="#8a5f41"/>
    </g>
  </g>
</svg>
